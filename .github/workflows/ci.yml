name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET build and test
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Cohestra.sln

      - name: Build
        run: dotnet build Cohestra.sln --no-restore -c Release

      - name: Test
        run: dotnet test Cohestra.sln --no-build -c Release --filter "Category!=Integration" --verbosity normal

      - name: SendGrid sandbox gate
        run: dotnet test src/Infrastructure.Tests/Infrastructure.Tests.csproj --no-build -c Release --filter "FullyQualifiedName~SendGridSettingsValidatorTests" --verbosity normal

      - name: TenantIsolation unit gate (SM-1)
        run: |
          set -euo pipefail
          LIST_FILE=$(mktemp)
          RUN_FILE=$(mktemp)
          dotnet test src/Infrastructure.Tests/Infrastructure.Tests.csproj --no-build -c Release \
            --list-tests --filter "Category=TenantIsolation" | tee "$LIST_FILE"
          if grep -q 'No test matches the given testcase filter' "$LIST_FILE"; then
            echo "SM-1 gate failed: Category=TenantIsolation matched zero unit tests."
            exit 1
          fi
          TEST_COUNT=$(grep -cE '^\s+Cohestra\.' "$LIST_FILE" || true)
          if [ "$TEST_COUNT" -lt 1 ]; then
            echo "SM-1 gate failed: no TenantIsolation unit tests listed (count=$TEST_COUNT)."
            exit 1
          fi
          dotnet test src/Infrastructure.Tests/Infrastructure.Tests.csproj --no-build -c Release \
            --filter "Category=TenantIsolation" --verbosity normal 2>&1 | tee "$RUN_FILE"
          if grep -qE 'Skipped:\s+[1-9]' "$RUN_FILE"; then
            echo "SM-1 gate failed: TenantIsolation unit tests were skipped (deps unavailable)."
            exit 1
          fi
          if ! grep -qE 'Passed:\s+[1-9]' "$RUN_FILE"; then
            echo "SM-1 gate failed: zero TenantIsolation unit tests passed."
            exit 1
          fi

  integration:
    name: API integration tests
    runs-on: ubuntu-latest
    env:
      CI: true
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=cohestra_test;Username=crm;Password=crm
      ConnectionStrings__Redis: localhost:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cohestra_test
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d cohestra_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Cohestra.sln

      - name: Build
        run: dotnet build Cohestra.sln --no-restore -c Release

      - name: Integration tests
        run: dotnet test src/Api.IntegrationTests/Api.IntegrationTests.csproj --no-build -c Release --filter "Category=Integration" --verbosity normal

      - name: TenantIsolation API gate (SM-1)
        run: |
          set -euo pipefail
          LIST_FILE=$(mktemp)
          RUN_FILE=$(mktemp)
          dotnet test src/Api.IntegrationTests/Api.IntegrationTests.csproj --no-build -c Release \
            --list-tests --filter "Category=TenantIsolation" | tee "$LIST_FILE"
          if grep -q 'No test matches the given testcase filter' "$LIST_FILE"; then
            echo "SM-1 gate failed: Category=TenantIsolation matched zero API tests."
            exit 1
          fi
          TEST_COUNT=$(grep -cE '^\s+Cohestra\.' "$LIST_FILE" || true)
          if [ "$TEST_COUNT" -lt 1 ]; then
            echo "SM-1 gate failed: no TenantIsolation API tests listed (count=$TEST_COUNT)."
            exit 1
          fi
          dotnet test src/Api.IntegrationTests/Api.IntegrationTests.csproj --no-build -c Release \
            --filter "Category=TenantIsolation" --verbosity normal 2>&1 | tee "$RUN_FILE"
          if grep -qE 'Skipped:\s+[1-9]' "$RUN_FILE"; then
            echo "SM-1 gate failed: TenantIsolation API tests were skipped (deps unavailable)."
            exit 1
          fi
          if ! grep -qE 'Passed:\s+[1-9]' "$RUN_FILE"; then
            echo "SM-1 gate failed: zero TenantIsolation API tests passed."
            exit 1
          fi

  web:
    name: Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
