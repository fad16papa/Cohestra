name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET build and test
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Cohestra.sln

      - name: Build
        run: dotnet build Cohestra.sln --no-restore -c Release

      - name: Test
        run: dotnet test Cohestra.sln --no-build -c Release --filter "Category!=Integration" --verbosity normal

      - name: SendGrid sandbox gate
        run: dotnet test src/Infrastructure.Tests/Infrastructure.Tests.csproj --no-build -c Release --filter "FullyQualifiedName~SendGridSettingsValidatorTests" --verbosity normal

  integration:
    name: API integration tests
    runs-on: ubuntu-latest
    env:
      CI: true
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=cohestra_test;Username=crm;Password=crm
      ConnectionStrings__Redis: localhost:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cohestra_test
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d cohestra_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Cohestra.sln

      - name: Build
        run: dotnet build Cohestra.sln --no-restore -c Release

      - name: Integration tests
        run: dotnet test src/Api.IntegrationTests/Api.IntegrationTests.csproj --no-build -c Release --filter "Category=Integration" --verbosity normal

  web:
    name: Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
