<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cohestra — Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0B1F2A;
      --teal: #0F9F8A;
      --teal-fg: #042F2E;
      --canvas: #FFFFFF;
      --muted: #F4F6F8;
      --ink: #0B1F2A;
      --ink3: #64748B;
      --line: #E2E8F0;
      --display: "Sora", sans-serif;
      --body: "Source Sans 3", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--body); background: var(--muted); color: var(--ink); }
    .shell { max-width: 640px; margin: 40px auto; padding: 0 16px 48px; }
    .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    h1 { font-family: var(--display); font-size: 1.5rem; letter-spacing: -0.03em; margin: 0; }
    .badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      background: #64748B; color: #fff; padding: 4px 8px; border-radius: 4px;
    }
    .card {
      background: var(--canvas); border: 1px solid var(--line); border-radius: 12px; padding: 20px;
    }
    label { display: block; font-size: 0.75rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
    input, select {
      width: 100%; height: 44px; border: 1px solid var(--line); border-radius: 8px;
      padding: 0 12px; font: inherit; background: var(--muted); color: var(--ink3); margin-bottom: 12px;
    }
    button:disabled {
      width: 100%; height: 44px; border: none; border-radius: 8px;
      background: #CBD5E1; color: #64748B; font-weight: 700; font-size: 0.95rem;
    }
    .gate {
      margin-top: 16px; padding: 16px; border-radius: 10px;
      border: 1px solid #99F6E4; background: #F0FDFA;
    }
    .gate h2 { font-family: var(--display); font-size: 1.05rem; margin: 0 0 6px; letter-spacing: -0.02em; }
    .gate p { margin: 0 0 12px; color: var(--ink3); line-height: 1.45; font-size: 0.95rem; }
    .btn {
      display: inline-flex; height: 40px; align-items: center; padding: 0 14px;
      background: var(--teal); color: var(--teal-fg); border-radius: 8px; font-weight: 700; text-decoration: none;
    }
    .you { margin-top: 16px; font-size: 0.9rem; color: var(--ink3); }
  </style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <h1>Team</h1>
      <span class="badge">Basic</span>
    </div>
    <div class="card">
      <label>Email</label>
      <input disabled value="marco@example.com" />
      <label>Role</label>
      <select disabled><option>Tenant Member</option></select>
      <button type="button" disabled>Send invite</button>
      <div class="gate">
        <h2>Need a second operator?</h2>
        <p>Basic includes 1 seat. Upgrade to Core for 3 seats — same registration workspace, shared client list.</p>
        <a class="btn" href="#">Upgrade to Core</a>
      </div>
      <p class="you"><strong style="color:var(--ink)">Priya</strong> — Tenant Admin</p>
    </div>
  </div>
</body>
</html>
