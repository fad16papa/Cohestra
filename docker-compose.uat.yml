# UAT / production-style Compose for a single Ubuntu droplet (DigitalOcean).
# nginx in Docker is the public entry point (see deploy/nginx/app.conf).
# Postgres and Redis bind to 127.0.0.1 on the droplet for SSH tunnel access (pgAdmin, RedisInsight).
#
# Usage:
#   cp .env.uat.example .env
#   docker compose -f docker-compose.uat.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leadgenerationcrm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-leadgenerationcrm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - campaign_assets_data:/app/data/campaign-assets
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-leadgenerationcrm};Username=${POSTGRES_USER:-crm};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?Set JWT_SIGNING_KEY in .env (min 32 chars)}
      Jwt__Issuer: ${JWT_ISSUER:-lead-generation-crm}
      Jwt__Audience: ${JWT_AUDIENCE:-lead-generation-crm-api}
      OperatorSeed__Enabled: "false"
      DemoDataSeed__Enabled: "false"
      PublicWeb__BaseUrl: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in .env}
      CampaignAssets__StoragePath: /app/data/campaign-assets
      CampaignAssets__PublicApiBaseUrl: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in .env}
      Cors__AllowedOrigins__0: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in .env}
      SendGrid__ApiKey: ${SendGrid__ApiKey:?Set SendGrid__ApiKey in .env (live Mail Send key)}
      SendGrid__FromEmail: ${SendGrid__FromEmail:-noreply@creativorare.com}
      SendGrid__FromName: ${SendGrid__FromName:-Creativorare}
      SendGrid__RegistrationFromEmail: ${SendGrid__RegistrationFromEmail:-noreply@creativorare.com}
      SendGrid__RegistrationFromName: ${SendGrid__RegistrationFromName:-Creativorare}
      SendGrid__UseSandbox: "false"
      EmailBranding__WebsiteUrl: ${EmailBranding__WebsiteUrl:-https://creativorare.com}
      EmailBranding__FooterLegalName: ${EmailBranding__FooterLegalName:-Creativorare}
      SiteLanding__SiteName: ${LANDING_SITE_NAME:-The Social Collective}
      SiteLanding__Tagline: ${LANDING_TAGLINE:-Community activities. Meaningful connections.}
      SiteLanding__Description: ${LANDING_DESCRIPTION:-Join our events, register in seconds, and stay connected with the communities you care about.}
      SiteLanding__Eyebrow: ${LANDING_EYEBROW:-Singapore · Community events}
      SiteLanding__OperatorCtaLabel: ${LANDING_OPERATOR_CTA:-Operator sign in}
      SiteLanding__PoweredByLabel: Powered by CreativoRare
      SiteLanding__AccentColor: "#c45c26"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in .env}
        NEXT_PUBLIC_LANDING_SITE_NAME: ${LANDING_SITE_NAME:-The Social Collective}
        NEXT_PUBLIC_LANDING_TAGLINE: ${LANDING_TAGLINE:-Community activities. Meaningful connections.}
        NEXT_PUBLIC_LANDING_DESCRIPTION: ${LANDING_DESCRIPTION:-Join our events, register in seconds, and stay connected with the communities you care about.}
        NEXT_PUBLIC_LANDING_EYEBROW: ${LANDING_EYEBROW:-Singapore · Community events}
        NEXT_PUBLIC_LANDING_OPERATOR_CTA: ${LANDING_OPERATOR_CTA:-Operator sign in}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_CONFIG_PATH:-./deploy/nginx/app.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ready >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: certbot

volumes:
  postgres_data:
  redis_data:
  campaign_assets_data:
  certbot_www:
  certbot_certs:

