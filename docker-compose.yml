name: cohestra-infra

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cohestra}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-cohestra}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    expose:
      - "8080"
    volumes:
      - campaign_assets_data:/app/data/campaign-assets
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-cohestra};Username=${POSTGRES_USER:-crm};Password=${POSTGRES_PASSWORD:-crm}
      ConnectionStrings__Redis: redis:6379
      Jwt__SigningKey: dev-compose-jwt-signing-key-min-32-chars!!
      OperatorSeed__Enabled: ${OperatorSeed__Enabled:-false}
      DemoDataSeed__Enabled: ${DemoDataSeed__Enabled:-false}
      PublicWeb__BaseUrl: ${PUBLIC_BASE_URL:-http://localhost}
      CampaignAssets__StoragePath: /app/data/campaign-assets
      CampaignAssets__PublicApiBaseUrl: ${PUBLIC_BASE_URL:-http://localhost}
      Cors__AllowedOrigins__0: ${PUBLIC_BASE_URL:-http://localhost}
      SendGrid__ApiKey: ${SendGrid__ApiKey:-}
      SendGrid__FromEmail: ${SendGrid__FromEmail:-noreply@cohestra.app}
      SendGrid__FromName: ${SendGrid__FromName:-Cohestra}
      SendGrid__RegistrationFromEmail: ${SendGrid__RegistrationFromEmail:-noreply@cohestra.app}
      SendGrid__RegistrationFromName: ${SendGrid__RegistrationFromName:-Cohestra}
      SendGrid__UseSandbox: ${SendGrid__UseSandbox:-false}
      EmailBranding__WebsiteUrl: ${EmailBranding__WebsiteUrl:-https://cohestra.app}
      EmailBranding__FooterLegalName: ${EmailBranding__FooterLegalName:-Cohestra}
      SiteLanding__SiteName: ${LANDING_SITE_NAME:-Cohestra}
      SiteLanding__Tagline: ${LANDING_TAGLINE:-Community events. Meaningful connections.}
      SiteLanding__Description: ${LANDING_DESCRIPTION:-Discover events, register in seconds, and stay connected with the communities you care about.}
      SiteLanding__Eyebrow: ${LANDING_EYEBROW:-Community events platform}
      SiteLanding__OperatorCtaLabel: ${LANDING_OPERATOR_CTA:-Operator sign in}
      SiteLanding__PoweredByLabel: Cohestra
      SiteLanding__AccentColor: "#2563eb"
      LegalCompliance__TermsVersion: "2026-07-21"
      LegalCompliance__PrivacyVersion: "2026-07-21"
      SelfServeSignup__RegistrationClosed: ${SelfServeSignup__RegistrationClosed:-false}
      SelfServeSignup__Recaptcha__Enabled: ${SelfServeSignup__Recaptcha__Enabled:-false}
      SelfServeSignup__Recaptcha__SecretKey: ${SelfServeSignup__Recaptcha__SecretKey:-}
      SelfServeSignup__Recaptcha__TestBypassToken: ${SelfServeSignup__Recaptcha__TestBypassToken:-test-captcha-pass}
      PublicSignupRateLimit__MaxSuccessfulPerHour: ${PublicSignupRateLimit__MaxSuccessfulPerHour:-5}
      PublicSignupRateLimit__MaxSuccessfulPerDay: ${PublicSignupRateLimit__MaxSuccessfulPerDay:-20}
      Stripe__SecretKey: ${Stripe__SecretKey:-}
      Stripe__PublishableKey: ${Stripe__PublishableKey:-}
      Stripe__WebhookSecret: ${Stripe__WebhookSecret:-}
      Stripe__PriceCoreMonthly: ${Stripe__PriceCoreMonthly:-}
      Stripe__PriceCoreAnnual: ${Stripe__PriceCoreAnnual:-}
      Stripe__PriceProMonthly: ${Stripe__PriceProMonthly:-}
      Stripe__PriceProAnnual: ${Stripe__PriceProAnnual:-}
      Stripe__TrialPeriodDays: ${Stripe__TrialPeriodDays:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://localhost}
        NEXT_PUBLIC_LANDING_SITE_NAME: ${LANDING_SITE_NAME:-Cohestra}
        NEXT_PUBLIC_LANDING_TAGLINE: ${LANDING_TAGLINE:-Community activities. Meaningful connections.}
        NEXT_PUBLIC_LANDING_DESCRIPTION: ${LANDING_DESCRIPTION:-Join our events, register in seconds, and stay connected with the communities you care about.}
        NEXT_PUBLIC_LANDING_EYEBROW: ${LANDING_EYEBROW:-Singapore · Community events}
        NEXT_PUBLIC_LANDING_OPERATOR_CTA: ${LANDING_OPERATOR_CTA:-Operator sign in}
        NEXT_PUBLIC_RECAPTCHA_ENABLED: ${NEXT_PUBLIC_RECAPTCHA_ENABLED:-false}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
        NEXT_PUBLIC_RECAPTCHA_TEST_TOKEN: ${NEXT_PUBLIC_RECAPTCHA_TEST_TOKEN:-test-captcha-pass}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  campaign_assets_data:

